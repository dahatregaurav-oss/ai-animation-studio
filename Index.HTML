<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Animate Studio V29</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="studio">

    <div id="toolbar">
        <button onclick="setMode('walk')">🚶 Walk</button>
        <button onclick="setMode('talk')">🗣 Talk</button>
        <button onclick="setMode('idle')">🙂 Idle</button>
        <button onclick="zoomIn()">➕ Zoom</button>
    </div>

    <div id="scene">

        <div id="character" class="idle">

            <img class="head" src="assets/characters/head.png">

            <img class="body" src="assets/characters/body.png">

            <img class="left-arm" src="assets/characters/arm.png">
            <img class="right-arm" src="assets/characters/arm.png">

            <img class="left-leg" src="assets/characters/leg.png">
            <img class="right-leg" src="assets/characters/leg.png">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
